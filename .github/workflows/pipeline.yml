name: Stock Pipeline (scan morning/close, eval nightly)

on:
  schedule:
    # JST 11:45 = UTC 02:45 (morning scan)
    - cron: "45 2 * * 1-5"
    # JST 16:00 = UTC 07:00 (close scan)
    - cron: "0 7 * * 1-5"
    # JST 21:30 = UTC 12:30 (nightly eval+agg)
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write   # dataブランチへpushするために必要

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (code)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas ta pytz openpyxl

      - name: Decide mode (scan_morning / scan_close / nightly)
        run: |
          # Default: auto by UTC hour for schedule runs
          # UTC 02:xx -> scan_morning
          # UTC 07:xx -> scan_close
          # UTC 12:xx -> nightly
          HOUR=$(date -u +"%H")

          if [ "$HOUR" = "02" ]; then
            echo "MODE=scan_morning" >> $GITHUB_ENV
          elif [ "$HOUR" = "07" ]; then
            echo "MODE=scan_close" >> $GITHUB_ENV
          else
            echo "MODE=nightly" >> $GITHUB_ENV
          fi

          echo "UTC_HOUR=$HOUR"
          echo "MODE=$MODE"

      # --- dataブランチ（永続ストレージ）の用意 ---
      - name: Checkout data branch (outputs storage)
        uses: actions/checkout@v4
        with:
          ref: data
          path: data_branch
        continue-on-error: true

      - name: Initialize data branch if missing
        if: ${{ failure() }}
        run: |
          mkdir -p data_branch
          cd data_branch
          git init
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch origin data || true
          # create orphan-like branch
          git checkout -b data
          mkdir -p outputs/signals outputs/results outputs/aggregates
          echo "# outputs storage branch" > README.md
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "init data branch"
          git push -u origin data

      # mainブランチのコード側 outputs を data ブランチ側に同期して処理する
      - name: Prepare workspace outputs from data branch
        run: |
          rm -rf outputs || true
          mkdir -p outputs
          # data_branch/outputs があればコピー
          if [ -d "data_branch/outputs" ]; then
            cp -r data_branch/outputs/* outputs/ || true
          fi
          mkdir -p outputs/signals outputs/results outputs/aggregates

      # --- 朝：scan(morning) ---
      - name: Run scan (morning)
        if: env.MODE == 'scan_morning'
        run: |
          python main.py --session morning

      # --- 夕：scan(close) ---
      - name: Run scan (close)
        if: env.MODE == 'scan_close'
        run: |
          python main.py --session close

      # --- 夜：evaluate + aggregate ---
      - name: Run evaluate (nightly)
        if: env.MODE == 'nightly'
        run: |
          # NOTE: close直後のものは eval_start が未来になり得るので
          # evaluate側に「未来ならOPENでスキップ」ガードを入れておくのがベター
          python evaluate_results.py --latest-meta || true

      - name: Run aggregate (nightly)
        if: env.MODE == 'nightly'
        run: |
          python aggregate.py || true

      # --- outputs を data ブランチへ保存 ---
      - name: Commit outputs to data branch
        run: |
          # outputs を data_branch に反映
          rm -rf data_branch/outputs || true
          mkdir -p data_branch/outputs
          cp -r outputs/* data_branch/outputs/

          cd data_branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs || true

          # 変更があるときだけcommit
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "update outputs $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin data
          fi

      # --- 直近7日ぶんは artifact でも残す（お守り） ---
      - name: Upload outputs artifact (7 days)
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ env.MODE }}
          path: outputs/
          retention-days: 7
