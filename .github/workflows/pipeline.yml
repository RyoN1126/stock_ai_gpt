name: Stock Scan Pipeline

on:
  schedule:
    # 前場終了後（11:35 JST = 02:35 UTC）
    - cron: "35 2 * * 1-5"
    # 引け後（15:35 JST = 06:35 UTC）
    - cron: "35 6 * * 1-5"

  workflow_dispatch:
    inputs:
      session:
        description: "morning or close (通常実行用)"
        required: true
        default: "close"
      date:
        description: "YYYY-MM-DD (JST, optional) (通常実行用)"
        required: false
        default: ""
      backfill_days:
        description: "Backfill last N days (0 = disabled). Ex: 10"
        required: false
        default: "0"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Setup Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # Decide session (scheduled)
      # =========================
      - name: Decide session (scheduled only)
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(date -u +"%H")
          if [ "$HOUR" = "02" ]; then
            echo "SESSION=morning" >> $GITHUB_ENV
          else
            echo "SESSION=close" >> $GITHUB_ENV
          fi

      # =========================
      # Manual dispatch inputs
      # =========================
      - name: Set session/date (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "SESSION=${{ inputs.session }}" >> $GITHUB_ENV
          echo "INPUT_DATE=${{ inputs.date }}" >> $GITHUB_ENV
          echo "BACKFILL_DAYS=${{ inputs.backfill_days }}" >> $GITHUB_ENV

      # =========================
      # (Backfill) Run main+evaluate for past N days (manual only)
      # =========================
      - name: Backfill (manual) - run main+evaluate for last N days
        if: github.event_name == 'workflow_dispatch' && inputs.backfill_days != '0'
        run: |
          set -e
          N=${{ inputs.backfill_days }}
          echo "=== BACKFILL start: last ${N} days ==="

          for i in $(seq 0 $N); do
            D=$(date -u -d "$i days ago" +"%Y-%m-%d")
            for S in morning close; do
              echo "=== BACKFILL main: date=$D session=$S ==="
              python main.py --date "$D" --session "$S" || true

              echo "=== BACKFILL eval: date=$D session=$S ==="
              python evaluate_results.py --date "$D" --session "$S" || true
            done
          done

      # =========================
      # (Normal) Run scanner (scheduled OR manual when backfill disabled)
      # =========================
      - name: Run scanner
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.backfill_days == '0')
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python main.py --session $SESSION --date $INPUT_DATE
          else
            python main.py --session $SESSION
          fi

      - name: List signals/outputs
        run: |
          ls -la
          ls -la signals || true
          ls -la outputs || true
          ls -la results || true

      # =========================
      # (Normal) Evaluate latest signals
      # =========================
      - name: Evaluate latest
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.backfill_days == '0')
        run: |
          python evaluate_results.py --latest

      # =========================
      # Aggregate results
      # =========================
      - name: Aggregate
        run: |
          python aggregate.py --all

      # =========================
      # Read meta for artifact/history naming
      # =========================
      - name: Read run meta
        run: |
          python - << 'PY'
          import json, os, glob

          meta_path = "outputs/today_candidates_latest_meta.json"
          run_id = os.environ.get("GITHUB_RUN_ID", "0")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "0")

          date = "unknown-date"
          sess = "unknown-session"

          if os.path.exists(meta_path):
              m = json.load(open(meta_path, "r", encoding="utf-8"))
              latest = m.get("latest_file", "")
              base = os.path.basename(latest)
              parts = base.replace(".json","").split("_")
              if len(parts) >= 3:
                  date = parts[1]
                  sess = parts[2]
          else:
              sigs = sorted(glob.glob("signals/signals_*.json"), key=lambda p: os.path.getmtime(p))
              if sigs:
                  base = os.path.basename(sigs[-1]).replace(".json","")
                  parts = base.split("_")
                  if len(parts) >= 3:
                      date = parts[1]
                      sess = parts[2]

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"RUN_DATE={date}\n")
              f.write(f"RUN_SESSION={sess}\n")
              f.write(f"RUN_ID={run_id}\n")
              f.write(f"RUN_NUMBER={run_number}\n")

          print("RUN_DATE", date, "RUN_SESSION", sess, "RUN_ID", run_id, "RUN_NUMBER", run_number)
          PY

      # =========================
      # Stage history snapshot (accumulate)
      # =========================
      - name: Stage history snapshot
        run: |
          mkdir -p "history/${RUN_DATE}/${RUN_SESSION}/run-${RUN_NUMBER}-${RUN_ID}"

          cp -r signals  "history/${RUN_DATE}/${RUN_SESSION}/run-${RUN_NUMBER}-${RUN_ID}/" || true
          cp -r outputs  "history/${RUN_DATE}/${RUN_SESSION}/run-${RUN_NUMBER}-${RUN_ID}/" || true
          cp -r results  "history/${RUN_DATE}/${RUN_SESSION}/run-${RUN_NUMBER}-${RUN_ID}/" || true

          mkdir -p "history/${RUN_DATE}/${RUN_SESSION}/latest"
          rm -rf "history/${RUN_DATE}/${RUN_SESSION}/latest/signals" \
                 "history/${RUN_DATE}/${RUN_SESSION}/latest/outputs" \
                 "history/${RUN_DATE}/${RUN_SESSION}/latest/results" || true
          cp -r signals "history/${RUN_DATE}/${RUN_SESSION}/latest/" || true
          cp -r outputs "history/${RUN_DATE}/${RUN_SESSION}/latest/" || true
          cp -r results "history/${RUN_DATE}/${RUN_SESSION}/latest/" || true

      # =========================
      # Push history to results-history branch (FIX: untracked overwrite)
      # =========================
      - name: Push history to results-history branch
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1) history を退避
          mkdir -p /tmp/history_backup
          rm -rf /tmp/history_backup/history || true
          cp -r history /tmp/history_backup/ || true

          # 2) untracked含めて作業ツリーをクリーン化（checkout衝突回避）
          git reset --hard
          git clean -fd

          # 3) results-history ブランチへ切替（無ければ作成）
          if git show-ref --verify --quiet refs/remotes/origin/results-history; then
            git checkout -B results-history origin/results-history
          else
            git checkout --orphan results-history
            git rm -rf . >/dev/null 2>&1 || true
          fi

          # 4) history を戻してコミット
          cp -r /tmp/history_backup/history ./

          git add history
          git commit -m "Add history ${RUN_DATE} ${RUN_SESSION} run-${RUN_NUMBER}-${RUN_ID}" || echo "No changes to commit"
          git push origin results-history

      # =========================
      # NEW: Build dashboard on results-history and publish to gh-pages
      # =========================

      - name: Build dashboard (use main tools + results-history data)
        run: |
          set -e

          # mainブランチに戻って tools/ を使う
          git checkout -B main origin/main

          # results-history から history/ を作業ツリーへ取り込む（tmp経由）
          git fetch origin results-history:results-history || true
          rm -rf /tmp/history_from_results || true
          mkdir -p /tmp/history_from_results

          git --work-tree=/tmp/history_from_results checkout results-history -- history

          # main作業ツリーに配置
          rm -rf history || true
          cp -r /tmp/history_from_results/history ./

          # dashboard生成
          python tools/build_dashboard.py

          ls -la site || true

      - name: Publish dashboard to gh-pages
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # site/ を退避（gh-pages切替のため）
          mkdir -p /tmp/site_backup
          rm -rf /tmp/site_backup/site || true
          cp -r site /tmp/site_backup/

          # クリーンにして gh-pages へ
          git reset --hard
          git clean -fd

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp -r /tmp/site_backup/site/* ./

          git add .
          git commit -m "Update dashboard (run-${RUN_NUMBER}-${RUN_ID})" || echo "No changes"
          git push origin gh-pages

      # =========================
      # Upload artifacts
      # =========================
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: stock-output-${{ env.RUN_DATE }}-${{ env.RUN_SESSION }}-run${{ github.run_number }}
          path: |
            signals/**
            outputs/**
            results/**
            history/${{ env.RUN_DATE }}/${{ env.RUN_SESSION }}/run-${{ env.RUN_NUMBER }}-${{ env.RUN_ID }}/**
            site/**
          if-no-files-found: warn
          retention-days: 90