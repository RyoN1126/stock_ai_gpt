# schedule refresh
name: Stock Pipeline (scan morning/close, eval nightly)

on:
  schedule:
    # JST 11:45 = UTC 02:45 (morning scan)
    - cron: "45 2 * * 1-5"
    # JST 16:00 = UTC 07:00 (close scan)
    - cron: "0 7 * * 1-5"
    # JST 21:30 = UTC 12:30 (nightly eval+agg)
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (code)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0          # dataブランチ操作のため
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas ta pytz openpyxl

      - name: Decide mode (scan_morning / scan_close / nightly)
        run: |
          HOUR=$(date -u +"%H")
          if [ "$HOUR" = "02" ]; then
            echo "MODE=scan_morning" >> $GITHUB_ENV
          elif [ "$HOUR" = "07" ]; then
            echo "MODE=scan_close" >> $GITHUB_ENV
          else
            echo "MODE=nightly" >> $GITHUB_ENV
          fi
          echo "UTC_HOUR=$HOUR" >> $GITHUB_ENV

      - name: Show mode
        run: |
          echo "UTC_HOUR=${UTC_HOUR}"
          echo "MODE=${MODE}"

      - name: Ensure outputs dirs exist
        run: |
          mkdir -p outputs/signals outputs/results outputs/aggregates

      # ---- Scan steps ----
      - name: Run scan (morning)
        if: env.MODE == 'scan_morning'
        run: |
          python main.py --session morning

      - name: Run scan (close)
        if: env.MODE == 'scan_close'
        run: |
          python main.py --session close

      # ---- Nightly steps ----
      - name: Run evaluation (nightly)
        if: env.MODE == 'nightly'
        run: |
          python evaluate_results.py --latest-meta || true

      - name: Run aggregate (nightly)
        if: env.MODE == 'nightly'
        run: |
          python aggregate.py || true

      # ---- Persist outputs to data branch ----
      - name: Persist outputs to data branch
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # fetch data branch if exists
          git fetch origin data || true

          # create/switch to data branch
          if git show-ref --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf . || true
            mkdir -p outputs/signals outputs/results outputs/aggregates
            echo "# outputs storage branch" > README.md
            git add README.md outputs
            git commit -m "init data branch"
          fi

          # bring outputs from main workspace into data branch
          # (main workspace outputs already in this working tree, so nothing to copy)
          git add outputs || true

          if git diff --cached --quiet; then
            echo "No outputs changes to commit."
          else
            git commit -m "update outputs $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin data
          fi

      - name: Upload outputs artifact (7 days)
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ env.MODE }}
          path: outputs/
          retention-days: 7
