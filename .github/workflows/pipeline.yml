name: Stock Pipeline (scan AM/PM, eval nightly)

on:
  schedule:
    # JST 11:45 = UTC 02:45 (morning scan)
    - cron: "45 2 * * 1-5"
    # JST 16:00 = UTC 07:00 (close scan)
    - cron: "0 7 * * 1-5"
    # JST 21:30 = UTC 12:30 (nightly: evaluate + aggregate)
    - cron: "30 12 * * 1-5"

  workflow_dispatch:
    inputs:
      task:
        description: "Manual task to run"
        required: true
        default: morning
        type: choice
        options:
          - morning
          - close
          - evaluate
          - aggregate
          - eval_and_aggregate

permissions:
  contents: write   # dataブランチへpushするため

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (code)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas ta pytz openpyxl

      # ---- Decide TASK ----
      - name: Decide task (schedule vs manual)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TASK=${{ inputs.task }}" >> $GITHUB_ENV
            echo "TRIGGER=manual" >> $GITHUB_ENV
            echo "SCHEDULED_CRON=manual" >> $GITHUB_ENV
          else
            CRON="${{ github.event.schedule }}"
            echo "TRIGGER=schedule" >> $GITHUB_ENV
            echo "SCHEDULED_CRON=$CRON" >> $GITHUB_ENV

            if [ "$CRON" = "45 2 * * 1-5" ]; then
              echo "TASK=morning" >> $GITHUB_ENV
            elif [ "$CRON" = "0 7 * * 1-5" ]; then
              echo "TASK=close" >> $GITHUB_ENV
            else
              echo "TASK=eval_and_aggregate" >> $GITHUB_ENV
            fi
          fi

      - name: Show task
        run: |
          echo "TRIGGER=${TRIGGER}"
          echo "SCHEDULED_CRON=${SCHEDULED_CRON}"
          echo "TASK=${TASK}"

      # ---- Ensure outputs (artifact guard) ----
      - name: Ensure outputs exist
        run: |
          mkdir -p outputs/signals outputs/results outputs/aggregates
          # 空だと artifact が作られないのでプレースホルダを置く
          touch outputs/.keep

      # ---- Run scan ----
      - name: Run scan (morning)
        if: env.TASK == 'morning'
        run: |
          python main.py --session morning

      - name: Run scan (close)
        if: env.TASK == 'close'
        run: |
          python main.py --session close

      # ---- Run evaluate / aggregate ----
      - name: Run evaluate
        if: env.TASK == 'evaluate' || env.TASK == 'eval_and_aggregate'
        run: |
          python evaluate_results.py --latest-meta || true

      - name: Run aggregate
        if: env.TASK == 'aggregate' || env.TASK == 'eval_and_aggregate'
        run: |
          python aggregate.py || true

      # ---- Persist outputs to data branch ----
      - name: Persist outputs to data branch
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # dataブランチを取得（無ければ作る）
          git fetch origin data || true

          if git show-ref --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf . || true
            mkdir -p outputs/signals outputs/results outputs/aggregates
            echo "# outputs storage branch" > README.md
            touch outputs/.keep
            git add README.md outputs
            git commit -m "init data branch"
          fi

          # outputs をコミット（変更があるときだけ）
          git add outputs || true
          if git diff --cached --quiet; then
            echo "No outputs changes to commit."
          else
            git commit -m "update outputs (${TASK}) $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin data
          fi

      # ---- Upload artifact (7 days) ----
      - name: Upload outputs artifact (7 days)
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ env.TRIGGER }}-${{ env.TASK }}
          path: outputs/
          retention-days: 7