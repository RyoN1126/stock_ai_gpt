name: Stock Scan Pipeline

on:
  schedule:
    # 前場終了後（11:35 JST = 02:35 UTC）
    - cron: "35 2 * * 1-5"
    # 引け後（15:35 JST = 06:35 UTC）
    - cron: "35 6 * * 1-5"

  workflow_dispatch:
    inputs:
      session:
        description: "morning or close"
        required: true
        default: "close"
      date:
        description: "YYYY-MM-DD (JST, optional)"
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Setup Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # Decide session (scheduled)
      # =========================
      - name: Decide session (scheduled only)
        if: github.event_name == 'schedule'
        run: |
          HOUR=$(date -u +"%H")
          if [ "$HOUR" = "02" ]; then
            echo "SESSION=morning" >> $GITHUB_ENV
          else
            echo "SESSION=close" >> $GITHUB_ENV
          fi

      # =========================
      # Manual dispatch inputs
      # =========================
      - name: Set session/date (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "SESSION=${{ inputs.session }}" >> $GITHUB_ENV
          echo "INPUT_DATE=${{ inputs.date }}" >> $GITHUB_ENV

      # =========================
      # Run scanner
      # =========================
      - name: Run scanner
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python main.py --session $SESSION --date $INPUT_DATE
          else
            python main.py --session $SESSION
          fi

      # =========================
      # Evaluate latest signals
      # =========================
      - name: Evaluate latest
        run: |
          python evaluate_results.py --latest

      # =========================
      # Aggregate results
      # =========================
      - name: Aggregate
        run: |
          python aggregate.py --all

      # =========================
      # Read meta for artifact naming
      # =========================
      - name: Read run meta
        run: |
          python - << 'PY'
          import json, os
          meta_path = "outputs/today_candidates_latest_meta.json"
          if not os.path.exists(meta_path):
              print("latest_meta not found:", meta_path)
              raise SystemExit(1)

          m = json.load(open(meta_path, "r", encoding="utf-8"))
          latest = m.get("latest_file", "")
          base = os.path.basename(latest)

          # signals_YYYY-MM-DD_session.json
          parts = base.replace(".json","").split("_")
          date = parts[1] if len(parts) >= 3 else "unknown-date"
          sess = parts[2] if len(parts) >= 3 else "unknown-session"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"RUN_DATE={date}\n")
              f.write(f"RUN_SESSION={sess}\n")
          PY

      # =========================
      # Upload artifacts (session+date)
      # =========================
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: stock-output-${{ env.RUN_DATE }}-${{ env.RUN_SESSION }}-run${{ github.run_number }}
          path: |
            signals/**
            outputs/**
            results/**
          if-no-files-found: warn