name: Stock Scan

on:
  schedule:
    # JST 11:45（UTC 02:45）
    - cron: '45 2 * * 1-5'
    # JST 16:00（UTC 07:00）
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas ta pytz openpyxl

      - name: Detect session
        run: |
          HOUR=$(date -u +"%H")
          if [ "$HOUR" -lt 5 ]; then
            echo "SESSION=morning" >> $GITHUB_ENV
          else
            echo "SESSION=close" >> $GITHUB_ENV
          fi

      - name: Run scanner
        run: python main.py --session $SESSION

      - name: Run evaluation
        run: python evaluate_results.py --latest-meta || true

      - name: Run aggregate
        run: python aggregate.py || true

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: outputs/
          retention-days: 7
